name: Link Check

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Accept some bot-hostile status codes (403/429) to avoid false
          # failures from sites that block CI; lychee respects .lycheeignore.
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --max-retries 2
            --accept 200,201,202,203,204,206,403,429
            "./**/*.md"
          output: ./lychee-report.md
          fail: false

      - name: Create issue on broken links (scheduled run)
        if: steps.lychee.outputs.exit_code != 0 && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken links detected by lychee"
          content-filepath: ./lychee-report.md
          labels: broken-link, automated

      - name: Fail the job on broken links (push / PR)
        if: steps.lychee.outputs.exit_code != 0 && github.event_name != 'schedule'
        run: |
          echo "lychee found broken links. See the report below:"
          cat ./lychee-report.md
          exit 1
